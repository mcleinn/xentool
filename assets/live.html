<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>xentool — Live HUD</title>
  <link rel="stylesheet" href="/live.css">
</head>
<body>
  <div class="liveRoot" id="liveRoot">
    <div class="liveCorner liveTL" id="cornerTL"></div>
    <div class="liveCorner liveTR" id="cornerTR"></div>
    <div class="liveCorner liveBL" id="cornerBL"></div>
    <div class="liveCorner liveBR" id="cornerBR"></div>

    <div class="liveMain" id="liveMain">
      <div class="liveMainText" id="liveMainText">&nbsp;</div>
      <div class="liveIntervals" id="liveIntervals"></div>
      <div class="liveHint" id="liveHint">tap to change view: notes</div>
    </div>

    <div class="oscPanel" id="oscPanel" hidden>
      <div class="oscParams" id="oscParams"></div>
      <div class="oscEvents" id="oscEvents"></div>
    </div>

    <div class="liveFooter" id="liveFooter" hidden></div>

    <div class="livePopover" id="livePopover" hidden>
      <div class="livePopoverTitle" id="popoverTitle"></div>
      <div class="livePopoverList" id="popoverList"></div>
      <div class="livePopoverHint">tap to close</div>
    </div>
  </div>
  <script src="/live.js"></script>
</body>
</html>
